<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="manifest" href="/manifest.json">
<link rel="icon" href="/favicon.ico">
<link rel="apple-touch-icon" href="/icons/icon-192.png">
<meta name="theme-color" content="#171B34">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Dekyiba">
<title>Take Restaurant Orders — Dekyiba Hotel</title>
<link rel="stylesheet" href="/css/style.css">
</head>
<body>

<header class="site-header">
  <nav class="nav">
    <a href="/" class="brand">Dekyiba <span>Hotel</span></a>
    <div class="nav-links">
      <a href="/">Home</a>
    </div>
    <div style="display:flex; align-items:center; gap:14px;">
      <span id="staff-status" style="font-size:0.82rem; opacity:0.85;"></span>
      <a href="/" class="nav-cta">Back to home</a>
    </div>
  </nav>
</header>

<div class="kente-stripe"></div>

<section class="hero" style="min-height:auto; padding:64px 0 40px;">
  <div class="hero-inner">
    <p class="eyebrow">Restaurant</p>
    <h1>Take restaurant orders</h1>
    <p class="lede">Record a guest's order here.</p>

    <div class="booking-widget" style="grid-template-columns: 1fr 1fr 1fr 1fr; align-items:end;">
      <div class="field">
        <label for="o-item">Item</label>
        <input type="text" id="o-item" list="menu-items" placeholder="e.g. Jollof rice">
        <datalist id="menu-items"></datalist>
      </div>
      <div class="field">
        <label for="o-category">Category</label>
        <input type="text" id="o-category" value="General">
      </div>
      <div class="field">
        <label for="o-qty">Quantity</label>
        <input type="number" id="o-qty" min="1" value="1">
      </div>
      <div class="field">
        <label for="o-price">Unit price</label>
        <input type="number" id="o-price" step="0.01" min="0" placeholder="0.00">
      </div>
    </div>
    <div class="field" style="max-width:520px; margin-top:14px;">
      <label for="o-notes">Notes (optional)</label>
      <input type="text" id="o-notes" placeholder="e.g. table 4, no pepper">
    </div>
    <button class="btn btn-primary" id="record-btn" style="margin-top:18px;">Record sale</button>
    <div class="status-msg" id="order-status"></div>
  </div>
</section>

<section id="today-orders">
  <div class="container">
    <div class="section-head">
      <p class="eyebrow">Live ledger</p>
      <h2>Today's restaurant sales</h2>
      
    </div>
    <table style="width:100%; border-collapse:collapse; background:#fff; border:1px solid var(--line); border-radius:var(--radius); overflow:hidden;">
      <thead>
        <tr style="background:var(--ivory-dim);">
          <th style="text-align:left; padding:12px 16px; font-size:0.82rem;">Item</th>
          <th style="text-align:left; padding:12px 16px; font-size:0.82rem;">Category</th>
          <th style="text-align:left; padding:12px 16px; font-size:0.82rem;">Qty</th>
          <th style="text-align:left; padding:12px 16px; font-size:0.82rem;">Amount</th>
          <th style="text-align:left; padding:12px 16px; font-size:0.82rem;">Time</th>
        </tr>
      </thead>
      <tbody id="orders-body">
        <tr><td colspan="5" style="text-align:center; padding:16px; color:#7a7560;">Loading…</td></tr>
      </tbody>
    </table>
  </div>
</section>

<script src="/js/staff-auth.js"></script>
<script src="/js/restaurant-orders.js"></script>
</body>
</html>
